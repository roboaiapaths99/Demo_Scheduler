<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tutor - Sales</title>
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 28px;
        }

        .tutors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .tutor-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .tutor-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }

        .tutor-header {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .tutor-avatar {
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .tutor-name {
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 5px 0;
        }

        .tutor-spec {
            font-size: 12px;
            opacity: 0.9;
            margin: 0;
        }

        .tutor-body {
            padding: 15px;
        }

        .rating {
            text-align: center;
            margin-bottom: 10px;
            color: #f57c00;
            font-weight: 600;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .stat-item {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-number {
            font-weight: bold;
            color: #764ba2;
            font-size: 18px;
        }

        .stat-label {
            color: #666;
            font-size: 11px;
            margin-top: 3px;
        }

        .btn-book {
            width: 100%;
            background-color: #764ba2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-book:hover:not(:disabled) {
            background-color: #667eea;
            transform: translateY(-2px);
        }

        .btn-book:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }

        .empty-state p {
            margin: 0;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #764ba2;
            font-size: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            margin-bottom: 20px;
            border-bottom: 2px solid #764ba2;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            margin: 0;
            color: #333;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-submit {
            width: 100%;
            background-color: #764ba2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #667eea;
        }

        @media (max-width: 768px) {
            .tutors-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <div class="page-header">
            <h1>👨‍🏫 Available Tutors</h1>
            <p style="color: #666; margin: 5px 0;">Browse and book from our available tutors</p>
        </div>

        <div id="tutorsContainer" class="loading">Loading tutors...</div>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="bookTutor.closeModal()">×</button>
            <div class="modal-header">
                <h2 id="modalTutorName"></h2>
            </div>

            <form id="bookingForm" onsubmit="bookTutor.submitBooking(event)">
                <div id="slotsContainer" style="margin-bottom: 20px;"></div>

                <div class="form-group">
                    <label for="clientName">Client Name *</label>
                    <input type="text" id="clientName" required>
                </div>

                <div class="form-group">
                    <label for="clientEmail">Email *</label>
                    <input type="email" id="clientEmail" required>
                </div>

                <div class="form-group">
                    <label for="clientPhone">Phone *</label>
                    <input type="tel" id="clientPhone" required>
                </div>

                <div class="form-group">
                    <label for="clientNotes">Notes</label>
                    <textarea id="clientNotes" placeholder="Add any special requests or notes..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script src="/js/navbar-manager.js"></script>
    <script>
        class BookTutor {
            constructor() {
                this.tutors = [];
                this.selectedSlots = [];
                this.currentTutor = null;
            }

            async init() {
                await navbarManager.init();
                if (!navbarManager.requireRole('sales')) return;
                await this.loadTutors();
            }

            async loadTutors() {
                try {
                    const token = localStorage.getItem('accessToken');
                    const response = await fetch('/api/data/sales/available-tutors', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await response.json();
                    
                    if (result.success && result.data.length > 0) {
                        this.tutors = result.data;
                        this.renderTutors();
                    } else {
                        document.getElementById('tutorsContainer').innerHTML = 
                            '<div class="empty-state"><p>No tutors available at the moment</p></div>';
                    }
                } catch (error) {
                    console.error('Error:', error);
                    document.getElementById('tutorsContainer').innerHTML = 
                        '<div class="empty-state"><p>Error loading tutors</p></div>';
                }
            }

            renderTutors() {
                const html = this.tutors.map(tutor => `
                    <div class="tutor-card">
                        <div class="tutor-header">
                            <div class="tutor-avatar">👨‍🏫</div>
                            <h3 class="tutor-name">${tutor.name}</h3>
                            <p class="tutor-spec">${tutor.specialization || 'General'}</p>
                        </div>
                        <div class="tutor-body">
                            <div class="rating">⭐ ${tutor.rating || 'New'}</div>
                            <div class="stats">
                                <div class="stat-item">
                                    <div class="stat-number">${tutor.availableSlots}</div>
                                    <div class="stat-label">Available</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-number">${tutor.upcomingBookings}</div>
                                    <div class="stat-label">Bookings</div>
                                </div>
                            </div>
                            <button class="btn-book" onclick="bookTutor.selectTutor('${tutor._id}', '${tutor.name}')" ${tutor.availableSlots === 0 ? 'disabled' : ''}>
                                ${tutor.availableSlots === 0 ? 'No Available Slots' : 'Book Now'}
                            </button>
                        </div>
                    </div>
                `).join('');

                document.getElementById('tutorsContainer').innerHTML = html;
            }

            async selectTutor(tutorId, tutorName) {
                this.currentTutor = tutorId;
                document.getElementById('modalTutorName').textContent = tutorName;

                try {
                    const token = localStorage.getItem('accessToken');
                    const response = await fetch(`/api/data/sales/tutor/${tutorId}/availability`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await response.json();
                    
                    if (result.success && result.data.length > 0) {
                        const slotsHtml = result.data.map((slot, idx) => `
                            <div style="margin-bottom: 10px;">
                                <label>
                                    <input type="radio" name="slot" value="${slot._id}" required>
                                    <strong>${this.formatDate(slot.date)}</strong> - ${slot.startTime} to ${slot.endTime}
                                </label>
                            </div>
                        `).join('');

                        document.getElementById('slotsContainer').innerHTML = 
                            `<div><strong>Select a time slot:</strong><div style="margin-top: 10px;">${slotsHtml}</div></div>`;
                        document.getElementById('bookingModal').classList.add('show');
                    } else {
                        alert('No available slots for this tutor');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error loading available slots');
                }
            }

            async submitBooking(e) {
                e.preventDefault();

                const slotId = document.querySelector('input[name="slot"]:checked')?.value;
                if (!slotId) {
                    alert('Please select a time slot');
                    return;
                }

                try {
                    const token = localStorage.getItem('accessToken');
                    const response = await fetch('/api/bookings', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            availabilityId: slotId,
                            clientName: document.getElementById('clientName').value,
                            clientEmail: document.getElementById('clientEmail').value,
                            clientPhone: document.getElementById('clientPhone').value,
                            clientNotes: document.getElementById('clientNotes').value
                        })
                    });

                    const result = await response.json();
                    
                    if (result.success) {
                        alert('Booking confirmed!');
                        this.closeModal();
                        document.getElementById('bookingForm').reset();
                        await this.loadTutors();
                    } else {
                        alert('Error: ' + (result.message || 'Failed to create booking'));
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error creating booking: ' + error.message);
                }
            }

            closeModal() {
                document.getElementById('bookingModal').classList.remove('show');
            }

            formatDate(date) {
                return new Date(date).toLocaleDateString('en-US', { 
                    weekday: 'short', 
                    month: 'short', 
                    day: 'numeric' 
                });
            }
        }

        const bookTutor = new BookTutor();
        document.addEventListener('DOMContentLoaded', () => bookTutor.init());
    </script>
</body>
</html>
