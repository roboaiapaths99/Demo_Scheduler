<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Dashboard - Scheduler</title>
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
        }

        .dashboard-wrapper {
            min-height: 100vh;
            background-color: #f5f7fa;
        }

        .dashboard-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .dashboard-header {
            margin-bottom: 30px;
        }

        .dashboard-header h1 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 28px;
        }

        .dashboard-header p {
            color: #666;
            margin: 0;
            font-size: 14px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-card .label {
            color: #666;
            font-size: 14px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .section-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .section-card h3 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .booking-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .booking-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .booking-item:last-child {
            border-bottom: none;
        }

        .booking-time {
            font-weight: 600;
            color: #667eea;
        }

        .booking-client {
            color: #333;
            flex: 1;
            margin-left: 15px;
        }

        .booking-status {
            background-color: #e3f2fd;
            color: #1976d2;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .booking-status.pending {
            background-color: #fff3e0;
            color: #f57c00;
        }

        .action-button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            margin-top: 15px;
            width: 100%;
        }

        .action-button:hover {
            background-color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            margin: 0;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="dashboard-wrapper">
        <div class="dashboard-content">
            <div class="dashboard-header">
                <h1>👨‍🏫 Tutor Dashboard</h1>
                <p>Manage your availability and bookings</p>
            </div>

            <div class="stats-container">
                <div class="stat-card">
                    <div class="number" id="availableCount">0</div>
                    <div class="label">Available Slots</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="bookedCount">0</div>
                    <div class="label">Booked Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="pendingCount">0</div>
                    <div class="label">Pending Requests</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="totalCount">0</div>
                    <div class="label">Total Bookings</div>
                </div>
            </div>

            <div class="grid-2">
                <div class="section-card">
                    <h3>📅 My Availability</h3>
                    <div id="availabilityList" class="loading">Loading...</div>
                    <button class="action-button" onclick="window.location.href='/tutor-availability.html'">
                        Manage Availability
                    </button>
                </div>

                <div class="section-card">
                    <h3>📋 Upcoming Bookings</h3>
                    <div id="bookingsList" class="loading">Loading...</div>
                    <button class="action-button" onclick="window.location.href='/tutor-bookings.html'">
                        View All Bookings
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/navbar-manager.js"></script>
    <script>
        class TutorDashboard {
            async init() {
                // Initialize navbar
                await navbarManager.init();
                
                // Check access
                if (!navbarManager.requireRole('tutor')) return;

                // Load dashboard data
                await this.loadStats();
                await this.loadAvailability();
                await this.loadBookings();
            }

            async loadStats() {
                try {
                    const token = localStorage.getItem('accessToken');
                    const response = await fetch('/api/data/tutor/my-availability', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        const slots = result.data;
                        const available = slots.filter(s => s.status === 'available').length;
                        const booked = slots.filter(s => s.status === 'booked').length;

                        document.getElementById('availableCount').textContent = available;
                        document.getElementById('bookedCount').textContent = booked;
                        document.getElementById('totalCount').textContent = slots.length;

                        // Get bookings for pending count
                        const bookResponse = await fetch('/api/data/tutor/my-bookings', {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const bookResult = await bookResponse.json();
                        if (bookResult.success) {
                            const pending = bookResult.data.bookings.filter(b => b.status === 'pending').length;
                            document.getElementById('pendingCount').textContent = pending;
                        }
                    }
                } catch (error) {
                    console.error('Error loading stats:', error);
                }
            }

            async loadAvailability() {
                try {
                    const token = localStorage.getItem('accessToken');
                    const response = await fetch('/api/data/tutor/my-availability', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await response.json();
                    
                    if (result.success && result.data.length > 0) {
                        const slots = result.data.slice(0, 5);
                        const html = slots.map(slot => `
                            <div class="booking-item">
                                <span class="booking-time">${this.formatTime(slot.startTime)} - ${this.formatTime(slot.endTime)}</span>
                                <span class="booking-status ${slot.status}">${slot.status}</span>
                            </div>
                        `).join('');
                        document.getElementById('availabilityList').innerHTML = html || '<div class="empty-state"><p>No availability slots</p></div>';
                    } else {
                        document.getElementById('availabilityList').innerHTML = '<div class="empty-state"><p>No availability slots</p></div>';
                    }
                } catch (error) {
                    console.error('Error loading availability:', error);
                }
            }

            async loadBookings() {
                try {
                    const token = localStorage.getItem('accessToken');
                    const response = await fetch('/api/data/tutor/my-bookings', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await response.json();
                    
                    if (result.success && result.data.bookings.length > 0) {
                        const bookings = result.data.bookings.slice(0, 5);
                        const html = bookings.map(booking => `
                            <div class="booking-item">
                                <div>
                                    <div class="booking-client">${booking.clientName}</div>
                                    <small style="color: #999;">${this.formatDate(booking.scheduledAt)}</small>
                                </div>
                                <span class="booking-status ${booking.status}">${booking.status}</span>
                            </div>
                        `).join('');
                        document.getElementById('bookingsList').innerHTML = html;
                    } else {
                        document.getElementById('bookingsList').innerHTML = '<div class="empty-state"><p>No bookings yet</p></div>';
                    }
                } catch (error) {
                    console.error('Error loading bookings:', error);
                }
            }

            formatTime(time) {
                if (!time) return '';
                return time.substring(0, 5);
            }

            formatDate(date) {
                return new Date(date).toLocaleDateString('en-US', { 
                    month: 'short', 
                    day: 'numeric', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
            }
        }

        const dashboard = new TutorDashboard();
        document.addEventListener('DOMContentLoaded', () => dashboard.init());
    </script>
</body>
</html>
