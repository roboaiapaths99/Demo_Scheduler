<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Tutor</title>
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 28px;
        }

        .filter-bar {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-bar select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .bookings-table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .bookings-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .bookings-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
        }

        .bookings-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .bookings-table tbody tr:hover {
            background-color: #f9f9f9;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background-color: #fff3e0;
            color: #f57c00;
        }

        .status-confirmed {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .status-completed {
            background-color: #e3f2fd;
            color: #1565c0;
        }

        .status-cancelled {
            background-color: #ffebee;
            color: #c62828;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-confirm {
            background-color: #4caf50;
            color: white;
        }

        .btn-confirm:hover {
            background-color: #45a049;
        }

        .btn-reject {
            background-color: #f44336;
            color: white;
        }

        .btn-reject:hover {
            background-color: #da190b;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state p {
            margin: 0;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .bookings-table {
                font-size: 12px;
            }

            .bookings-table th,
            .bookings-table td {
                padding: 10px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn-small {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <div class="page-header">
            <h1>📅 My Bookings</h1>
            <p style="color: #666; margin: 5px 0;">View and manage all your scheduled sessions</p>
        </div>

        <div class="filter-bar">
            <select id="statusFilter" onchange="tutorBookings.filterBookings()">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="confirmed">Confirmed</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
            </select>
        </div>

        <table class="bookings-table">
            <thead>
                <tr>
                    <th>Client Name</th>
                    <th>Email</th>
                    <th>Date & Time</th>
                    <th>Duration</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="bookingsBody">
                <tr><td colspan="6" class="loading">Loading bookings...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="/js/navbar-manager.js"></script>
    <script>
        class TutorBookings {
            constructor() {
                this.allBookings = [];
            }

            async init() {
                await navbarManager.init();
                if (!navbarManager.requireRole('tutor')) return;
                await this.loadBookings();
            }

            async loadBookings() {
                try {
                    const token = localStorage.getItem('accessToken');
                    const response = await fetch('/api/data/tutor/my-bookings', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        this.allBookings = result.data.bookings;
                        this.renderBookings(this.allBookings);
                    } else {
                        document.getElementById('bookingsBody').innerHTML = 
                            '<tr><td colspan="6" class="empty-state"><p>No bookings found</p></td></tr>';
                    }
                } catch (error) {
                    console.error('Error loading bookings:', error);
                    document.getElementById('bookingsBody').innerHTML = 
                        '<tr><td colspan="6" class="empty-state"><p>Error loading bookings</p></td></tr>';
                }
            }

            renderBookings(bookings) {
                if (bookings.length === 0) {
                    document.getElementById('bookingsBody').innerHTML = 
                        '<tr><td colspan="6" class="empty-state"><p>No bookings found</p></td></tr>';
                    return;
                }

                const html = bookings.map(booking => `
                    <tr>
                        <td>${booking.clientName}</td>
                        <td>${booking.clientEmail}</td>
                        <td>${this.formatDateTime(booking.scheduledAt, booking.startTime)}</td>
                        <td>${booking.duration || 'N/A'} min</td>
                        <td><span class="status-badge status-${booking.status}">${booking.status}</span></td>
                        <td>
                            <div class="action-buttons">
                                ${booking.status === 'pending' ? `
                                    <button class="btn-small btn-confirm" onclick="tutorBookings.confirmBooking('${booking._id}')">Confirm</button>
                                    <button class="btn-small btn-reject" onclick="tutorBookings.rejectBooking('${booking._id}')">Reject</button>
                                ` : '<span style="font-size: 12px; color: #999;">-</span>'}
                            </div>
                        </td>
                    </tr>
                `).join('');

                document.getElementById('bookingsBody').innerHTML = html;
            }

            filterBookings() {
                const status = document.getElementById('statusFilter').value;
                const filtered = status ? 
                    this.allBookings.filter(b => b.status === status) : 
                    this.allBookings;
                this.renderBookings(filtered);
            }

            async confirmBooking(bookingId) {
                if (!confirm('Confirm this booking?')) return;
                
                try {
                    const token = localStorage.getItem('accessToken');
                    const response = await fetch(`/api/bookings/${bookingId}/confirm`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        alert('Booking confirmed!');
                        await this.loadBookings();
                    } else {
                        alert('Error: ' + (result.message || 'Failed to confirm'));
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error confirming booking');
                }
            }

            async rejectBooking(bookingId) {
                if (!confirm('Reject this booking?')) return;
                
                try {
                    const token = localStorage.getItem('accessToken');
                    const response = await fetch(`/api/bookings/${bookingId}/reject`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        alert('Booking rejected');
                        await this.loadBookings();
                    } else {
                        alert('Error: ' + (result.message || 'Failed to reject'));
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error rejecting booking');
                }
            }

            formatDateTime(date, time) {
                const d = new Date(date);
                const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                return `${dateStr} ${time}`;
            }
        }

        const tutorBookings = new TutorBookings();
        document.addEventListener('DOMContentLoaded', () => tutorBookings.init());
    </script>
</body>
</html>
